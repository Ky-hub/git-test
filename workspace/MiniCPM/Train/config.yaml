model_name_or_path: "openbmb/MiniCPM-o-4_5"
trust_remote_code: true
cuda_visible_devices: "0"

torch_dtype: "bfloat16"
device: "cuda"
mode: "chat"

freeze_llm: false
freeze_vision: true
freeze_audio: true
freeze_tts: true
unfreeze_llm_layers: null

data:
  asr:
    task_dir: "data/asr"
    train_json: "train.json"
    val_json: "val.json"
    system_prompt_file: "system_prompt.txt"
    audio_dir: "audio"
    audio_subdirs:
      - "batch_2024_01"
      - "batch_2024_02"
    max_audio_length: 30

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  num_epochs: 3
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  num_workers: 4
  max_text_length: 256

output_dir: "./minicpmo_asr_finetuned"
save_steps: 500
log_steps: 10
